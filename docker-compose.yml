services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWUSER: '${WWWUSER:-1337}'
                WWWGROUP: '${WWWGROUP:-33}'
        image: printpandora:latest
        container_name: printpandora-app
        ports:
            - '${APP_PORT:-8080}:80'
            - '${VITE_PORT:-5173}:5173'
        environment:
            WWWUSER: '${WWWUSER:-1337}'
            WWWGROUP: '${WWWGROUP:-33}'
            APP_ENV: '${APP_ENV:-local}'
            APP_URL: '${APP_URL:-http://localhost:${APP_PORT:-8080}}'
            VITE_APP_NAME: '${VITE_APP_NAME:-${APP_NAME}}'
            # Match Mailtrap defaults from .env.example when not overridden.
            MAIL_MAILER: '${MAIL_MAILER:-smtp}'
            MAIL_HOST: '${MAIL_HOST:-sandbox.smtp.mailtrap.io}'
            MAIL_PORT: '${MAIL_PORT:-2525}'
        volumes:
            # Sync local source code into the container.
            - '.:/var/www/html'
            # Use named volumes for dependency folders to keep Windows file
            # syncing fast and avoid permission conflicts.
            - 'sail-vendor:/var/www/html/vendor'
            - 'sail-node-modules:/var/www/html/node_modules'
        networks:
            - printpandora
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:80/up']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 40s

networks:
    printpandora:
        driver: bridge

volumes:
    sail-vendor:
    sail-node-modules:
